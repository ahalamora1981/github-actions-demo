# ============================================================================
# GitHub Actions CI/CD 完整演示
# ============================================================================
# 本文件定义了项目的自动化流水线，包含两个阶段：
#   1. CI (Continuous Integration / 持续集成)
#   2. CD (Continuous Deployment / 持续部署)
#
# 作者: ahalamora1981
# 项目: github-actions-demo
# ============================================================================

name: CI/CD Pipeline  # 工作流的总名称，会显示在 GitHub Actions 页面

# ----------------------------------------------------------------------------
# on: 触发条件 —— 告诉 GitHub "什么时候" 运行这个流水线
# ----------------------------------------------------------------------------
on:
  # 触发条件 —— 告诉 GitHub "什么时候" 运行这个流水线
  # 注意：同一个事件类型（如 push）只能写一个块，所有条件要合并在一起
  push:
    branches: [main]          # 1) push 到 main 分支时触发 CI
    tags:
      - 'v*'                  # 2) push 版本标签（如 v1.0.0）时触发 CD
  pull_request:
    branches: [main]          # 3) 对 main 分支发起 PR 时触发 CI

# ----------------------------------------------------------------------------
# jobs: 定义流水线中的"任务"
# 一个工作流可以包含多个 job，它们默认并行运行
# ----------------------------------------------------------------------------
jobs:

  # ==========================================================================
  # Job 1: CI —— 持续集成
  # 目标：自动检查代码质量、运行测试，确保代码没有问题才能合并
  # ==========================================================================
  ci:
    name: "🔍 CI - 持续集成"  # 显示在 GitHub Actions 页面上的任务名称

    # runs-on: 指定运行环境（虚拟机）
    # 使用 "matrix" 策略可以在多个环境中并行测试
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]  # 同时在 Ubuntu 和 Windows 上测试
        python-version: ["3.11", "3.12"]     # 同时测试 Python 3.11 和 3.12

    runs-on: ${{ matrix.os }}  # 使用矩阵变量动态指定操作系统

    steps:
      # ----------------------------------------------------------------------
      # Step 1: 检出代码
      # actions/checkout 是 GitHub 官方提供的 Action，作用是把仓库代码
      # 下载到当前工作目录中，这样后续步骤才能访问代码文件
      # ----------------------------------------------------------------------
      - name: "📥 检出代码 (Checkout)"
        uses: actions/checkout@v4

      # ----------------------------------------------------------------------
      # Step 2: 安装 uv
      # uv 是 Astral 公司开发的极速 Python 包管理器
      # 我们在 CI 中也使用 uv，保持与本地开发环境一致
      # ----------------------------------------------------------------------
      - name: "⚡ 安装 uv"
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"  # 安装最新版 uv

      # ----------------------------------------------------------------------
      # Step 3: 设置 Python 版本
      # uv 可以根据 .python-version 文件或 pyproject.toml 自动选择 Python
      # 这里我们显式指定矩阵中的 Python 版本，确保测试覆盖多个版本
      # ----------------------------------------------------------------------
      - name: "🐍 设置 Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ----------------------------------------------------------------------
      # Step 4: 安装项目依赖
      # `uv sync` 会根据 pyproject.toml 和 uv.lock 安装依赖
      # 如果没有 uv.lock，uv 会解析并创建它
      # ----------------------------------------------------------------------
      - name: "📦 安装依赖 (uv sync)"
        run: uv sync --all-extras --dev

      # ----------------------------------------------------------------------
      # Step 5: 运行单元测试
      # `uv run` 会自动激活虚拟环境并运行命令
      # 这是 CI 的核心：如果任何测试失败，整个 job 会失败，阻止代码合并
      # ----------------------------------------------------------------------
      - name: "🧪 运行单元测试"
        run: uv run python -m unittest discover -s tests -v

      # ----------------------------------------------------------------------
      # Step 6: 代码质量检查 —— 使用 flake8 检查代码风格
      # 这是一个"门禁"步骤，确保代码符合 PEP8 规范
      # ----------------------------------------------------------------------
      - name: "🔎 代码风格检查 (flake8)"
        run: |
          uv add --dev flake8
          uv run flake8 src tests --max-line-length=120 --exclude=.venv

      # ----------------------------------------------------------------------
      # Step 7: 运行主程序演示
      # 虽然只是演示，但这证明程序在 CI 环境中能正常运行
      # ----------------------------------------------------------------------
      - name: "🚀 运行演示程序"
        run: uv run main.py

  # ==========================================================================
  # Job 2: CD —— 持续部署
  # 目标：当代码通过 CI 测试，并且打了版本标签 (tag) 时，自动打包发布
  #
  # needs: ci  表示 CD 必须在 CI 成功之后才能运行
  # 这是一个"依赖"关系，确保"有问题的代码不会被部署"
  # ==========================================================================
  cd:
    name: "🚀 CD - 持续部署"
    needs: ci  # 依赖 ci job，只有 ci 全部成功才会运行 cd

    # 只在推送 tag 时运行（如 git tag v1.0.0 && git push origin v1.0.0）
    if: startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest  # 打包发布只需要在一个环境中执行

    steps:
      # ----------------------------------------------------------------------
      # Step 1: 检出代码（需要完整历史记录来生成 changelog）
      # ----------------------------------------------------------------------
      - name: "📥 检出代码"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整 git 历史，用于生成 release notes

      # ----------------------------------------------------------------------
      # Step 2: 安装 uv
      # ----------------------------------------------------------------------
      - name: "⚡ 安装 uv"
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # ----------------------------------------------------------------------
      # Step 3: 设置 Python
      # ----------------------------------------------------------------------
      - name: "🐍 设置 Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ----------------------------------------------------------------------
      # Step 4: 打包项目
      # 使用 Python 的 build 工具打包成 .tar.gz 和 .whl
      # 这是发布到 PyPI 或作为 Release 附件的标准格式
      # ----------------------------------------------------------------------
      - name: "📦 构建打包文件"
        run: |
          uv add --dev build
          uv run python -m build

      # ----------------------------------------------------------------------
      # Step 5: 创建 GitHub Release
      # 自动在 GitHub 上创建一个 Release 页面，包含版本说明和构建产物
      # ----------------------------------------------------------------------
      - name: "📝 创建 GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          # 上传 dist 目录下的所有打包文件（.tar.gz 和 .whl）
          files: dist/*
          # 自动生成 release notes（基于 commit 和 PR）
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # secrets.GITHUB_TOKEN 是 GitHub 自动提供的临时令牌
          # 不需要手动配置，它有权限在当前仓库创建 Release
